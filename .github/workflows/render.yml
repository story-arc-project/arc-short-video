name: Render & upload promo video

on:
  push:
    branches:
      - claude/arc-promo-video-JcoBb
      - main
  workflow_dispatch:
    inputs:
      quality:
        description: "Render quality"
        type: choice
        default: high
        options: [high, medium, low]

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps (cairo, pango, ffmpeg, Korean fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango1.0-dev libcairo2-dev pkg-config ffmpeg fonts-noto-cjk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Render video
        env:
          QUALITY: ${{ inputs.quality || 'high' }}
        run: |
          case "$QUALITY" in
            low)    flags=(-r 540,960   --frame_rate 15) ;;
            medium) flags=(-r 720,1280  --frame_rate 30) ;;
            *)      flags=(-r 1080,1920 --frame_rate 60) ;;
          esac
          manim "${flags[@]}" scenes/promo.py ARCPromo

      - name: Verify output
        run: |
          test -f media/videos/ARCPromo.mp4
          ffprobe -v error -show_entries stream=width,height,duration \
            -of default=nw=1 media/videos/ARCPromo.mp4

      - name: Upload as workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ARCPromo-${{ github.sha }}
          path: media/videos/ARCPromo.mp4
          retention-days: 30

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone with service account
        env:
          SA_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "${SA_JSON}" ]]; then
            echo "::error::GDRIVE_SERVICE_ACCOUNT_JSON secret is missing — see README §CI for setup."
            exit 1
          fi
          mkdir -p "$HOME/.config/rclone"
          sa_path="$HOME/.config/rclone/sa.json"
          printf '%s' "$SA_JSON" > "$sa_path"
          chmod 600 "$sa_path"
          cat > "$HOME/.config/rclone/rclone.conf" <<EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = $sa_path
          EOF

      - name: Upload to Google Drive
        env:
          DRIVE_FOLDER_ID: ${{ secrets.RCLONE_DRIVE_FOLDER_ID }}
        run: |
          if [[ -z "${DRIVE_FOLDER_ID}" ]]; then
            echo "::error::RCLONE_DRIVE_FOLDER_ID secret is missing — see README §CI for setup."
            exit 1
          fi
          ts=$(date -u +'%Y%m%d-%H%M%S')
          short_sha=${GITHUB_SHA::7}
          dest_name="ARCPromo-${ts}-${short_sha}.mp4"
          # `--drive-root-folder-id` scopes the upload to a folder the
          # service account has been granted access to. Without it the SA
          # would try to write to its own (empty) Drive root.
          rclone copyto \
            "media/videos/ARCPromo.mp4" \
            "gdrive:${dest_name}" \
            --drive-root-folder-id "${DRIVE_FOLDER_ID}" \
            --progress
          echo "Uploaded to Google Drive as ${dest_name}"
