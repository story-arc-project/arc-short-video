[CLI]
# Default render: 9:16 vertical for YouTube Shorts / Reels / TikTok.
pixel_width = 1080
pixel_height = 1920
frame_rate = 60

# Render targets
media_dir = ./media
video_dir = ./media/videos

# arc-frontend page background (Toss-style off-white). The browser-frame
# mock cards render as #ffffff on top of this so they pop visibly.
background_color = #f9fafb

# Don't open the player automatically when rendering from CI / scripts.
preview = False
write_to_movie = True
disable_caching = False

# manim's built-in quality flags (-ql / -qm / -qh / -qk) override pixel_width/
# height with their own 16:9 defaults. We mirror them here so the same flags
# render vertical 9:16 at varying speeds.
[low_quality]
pixel_width = 540
pixel_height = 960
frame_rate = 15

[medium_quality]
pixel_width = 720
pixel_height = 1280
frame_rate = 30

[high_quality]
pixel_width = 1080
pixel_height = 1920
frame_rate = 60

[production_quality]
pixel_width = 1080
pixel_height = 1920
frame_rate = 60

[fourk_quality]
pixel_width = 2160
pixel_height = 3840
frame_rate = 60
